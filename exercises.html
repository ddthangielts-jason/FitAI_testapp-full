<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitAI — Thư viện bài tập</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --lime:#c8f135;--lime-d:#a8d015;
  --bg:#080808;--bg2:#111;--bg3:#181818;--bg4:#202020;--bg5:#282828;
  --txt:#f0efe8;--txt2:#909090;--txt3:#505050;
  --brd:#232323;--brd2:#2e2e2e;
  --red:#ff4545;--blue:#4d9fff;--amber:#ffb84d;--pink:#ff6eb4;--teal:#3dd9b3;
  --FD:'Bebas Neue',sans-serif;--FB:'DM Sans',sans-serif;--FM:'JetBrains Mono',monospace;
  --r:10px;--rl:14px;--rxl:20px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--FB);font-size:15px;overflow:hidden}
input,select,button{font-family:var(--FB);-webkit-appearance:none}
::-webkit-scrollbar{width:0}

/* ── SHELL ── */
#app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative;background:var(--bg)}

/* ── HEADER ── */
.top-bar{padding:18px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--brd)}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wordmark{font-family:var(--FD);font-size:22px;letter-spacing:.06em}
.wordmark span{color:var(--lime)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--txt2);font-size:13px;cursor:pointer;background:none;border:none}
.back-btn svg{width:18px;height:18px}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3)}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px 10px 38px;color:var(--txt);font-size:14px;outline:none;transition:border .2s}
.search-inp:focus{border-color:var(--lime)}
.search-inp::placeholder{color:var(--txt3)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;display:none}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{padding:6px 13px;border-radius:20px;font-size:12px;border:1px solid var(--brd2);background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .2s;font-family:var(--FB);flex-shrink:0}
.pill.on{background:var(--lime);color:#111;border-color:var(--lime);font-weight:500}

/* ── FILTER TABS (muscle group) ── */
.muscle-tabs{display:flex;gap:5px;overflow-x:auto;padding:10px 18px 0;flex-shrink:0;scrollbar-width:none}
.muscle-tabs::-webkit-scrollbar{display:none}
.mtab{padding:5px 12px;border-radius:20px;font-size:11.5px;border:1px solid var(--brd2);background:transparent;color:var(--txt3);cursor:pointer;white-space:nowrap;transition:all .2s;font-family:var(--FM);letter-spacing:.03em;flex-shrink:0}
.mtab.on{background:var(--bg3);color:var(--txt);border-color:var(--txt3)}

/* ── GRID ── */
.grid-wrap{flex:1;overflow-y:auto;padding:12px 18px 24px}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ex-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.ex-card:active{transform:scale(.97)}
.ex-card:hover{border-color:var(--brd2)}
.ex-gif{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg3);display:block}
.ex-gif-placeholder{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.ex-gif-placeholder .ex-emoji{font-size:32px}
.ex-gif-placeholder .ex-pname{font-family:var(--FD);font-size:13px;color:var(--txt3);letter-spacing:.06em;text-align:center;padding:0 8px}
.ex-info{padding:10px}
.ex-name{font-size:12.5px;font-weight:500;line-height:1.35;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ex-tags{display:flex;flex-wrap:wrap;gap:3px}
.ex-tag{font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:500}
.tg-muscle{background:#1e2e00;color:#9fd44f}
.tg-equip{background:#0d1e33;color:#6aaaf5}
.tg-diff{background:#2e1a00;color:#f5a84d}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skel 1.5s infinite}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── COUNT BAR ── */
.count-bar{padding:8px 18px 4px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.count-txt{font-size:11px;color:var(--txt3);font-family:var(--FM)}
.sort-btn{font-size:11px;color:var(--txt3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:var(--FM)}

/* ── DETAIL MODAL ── */
#detail-modal{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column;max-width:430px;margin:0 auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
#detail-modal.show{display:flex;transform:translateY(0)}
.dm-header{flex-shrink:0;position:relative}
.dm-gif-wrap{width:100%;aspect-ratio:4/3;background:var(--bg2);overflow:hidden;position:relative}
.dm-gif{width:100%;height:100%;object-fit:cover}
.dm-gif-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.dm-gif-placeholder .big-emoji{font-size:72px}
.dm-close{position:absolute;top:16px;left:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.dm-badge-wrap{position:absolute;bottom:14px;right:14px;display:flex;gap:5px}
.dm-badge{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
.dm-body{flex:1;overflow-y:auto;padding:18px}
.dm-name{font-family:var(--FD);font-size:32px;letter-spacing:.04em;line-height:1.05;margin-bottom:6px}
.dm-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.dm-divider{height:1px;background:var(--brd);margin:14px 0}
.dm-section{margin-bottom:16px}
.dm-sec-title{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--FM);margin-bottom:10px}
.cue-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.cue-item{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--brd)}
.cue-num{width:20px;height:20px;border-radius:50%;background:var(--lime);color:#111;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:var(--FM)}
.cue-text{font-size:13px;color:var(--txt2);line-height:1.55}
.mistake-list{display:flex;flex-direction:column;gap:6px}
.mistake-item{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--txt2);line-height:1.5}
.mistake-item::before{content:'✕';color:var(--red);flex-shrink:0;font-size:12px;margin-top:2px}
.ai-box{background:#1e2e00;border:1px solid #2d4400;border-radius:var(--r);padding:12px}
.ai-box-title{font-size:10px;color:var(--lime);font-family:var(--FM);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ai-box-content{font-size:13px;color:#c8e89a;line-height:1.65}
.add-btn{width:100%;background:var(--lime);color:#111;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;margin-top:4px;font-family:var(--FB)}
.add-btn:hover{background:var(--lime-d)}

/* ── AI LOADING ── */
.ai-loading{display:flex;gap:4px;align-items:center;padding:4px 0}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--lime);animation:bl 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--lime);color:#111;padding:9px 20px;border-radius:20px;font-size:12.5px;font-weight:500;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:9999}
#toast.on{opacity:1}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty .big{font-size:48px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.6}

/* ── BODY MAP SVG ── */
.body-map{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.body-map-img{background:var(--bg3);border-radius:var(--r);padding:12px;display:flex;align-items:center;justify-content:center}
.body-map-img svg{width:70px;height:auto;opacity:.9}
</style>
</head>
<body>
<div id="toast"></div>

<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-row">
      <button class="back-btn" onclick="window.location.href='app.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span>FitAI</span>
      </button>
      <div class="wordmark">BÀI <span>TẬP</span></div>
      <div style="width:60px"></div>
    </div>
    <div class="search-wrap">
      <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-inp" id="search-inp" placeholder="Tìm bài tập..." oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <!-- Equipment filter -->
    <div class="filters" id="equip-filters">
      <button class="pill on" onclick="filterEquip('all',this)">Tất cả</button>
      <button class="pill" onclick="filterEquip('barbell',this)">Barbell</button>
      <button class="pill" onclick="filterEquip('dumbbell',this)">Dumbbell</button>
      <button class="pill" onclick="filterEquip('cable',this)">Cable</button>
      <button class="pill" onclick="filterEquip('machine',this)">Machine</button>
      <button class="pill" onclick="filterEquip('body weight',this)">Bodyweight</button>
    </div>
  </div>

  <!-- MUSCLE TABS -->
  <div class="muscle-tabs" id="muscle-tabs">
    <button class="mtab on" onclick="filterMuscle('all',this)">Tất cả</button>
    <button class="mtab" onclick="filterMuscle('chest',this)">Ngực</button>
    <button class="mtab" onclick="filterMuscle('back',this)">Lưng</button>
    <button class="mtab" onclick="filterMuscle('shoulders',this)">Vai</button>
    <button class="mtab" onclick="filterMuscle('upper arms',this)">Bắp tay</button>
    <button class="mtab" onclick="filterMuscle('upper legs',this)">Đùi</button>
    <button class="mtab" onclick="filterMuscle('glutes',this)">Mông</button>
    <button class="mtab" onclick="filterMuscle('lower legs',this)">Bắp chân</button>
    <button class="mtab" onclick="filterMuscle('core',this)">Core</button>
  </div>

  <!-- COUNT -->
  <div class="count-bar">
    <span class="count-txt" id="count-txt">Đang tải...</span>
    <button class="sort-btn" onclick="toggleSort()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="13" y1="18" x2="21" y2="18"/></svg>
      <span id="sort-lbl">A→Z</span>
    </button>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="ex-grid" id="ex-grid">
      <!-- skeleton placeholders -->
      ${Array(8).fill('<div class="ex-card"><div class="ex-gif-placeholder skeleton" style="aspect-ratio:1"></div><div class="ex-info"><div class="skeleton" style="height:14px;border-radius:4px;margin-bottom:6px"></div><div class="skeleton" style="height:14px;width:60%;border-radius:4px;margin-bottom:8px"></div><div class="skeleton" style="height:18px;width:40%;border-radius:10px"></div></div></div>').join('')}
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal">
  <div class="dm-header">
    <div class="dm-gif-wrap" id="dm-gif-wrap">
      <div class="dm-gif-placeholder"><span class="big-emoji" id="dm-emoji">💪</span></div>
    </div>
    <button class="dm-close" onclick="closeDetail()">←</button>
    <div class="dm-badge-wrap" id="dm-badges"></div>
  </div>
  <div class="dm-body">
    <div class="dm-name" id="dm-name">Bài tập</div>
    <div class="dm-meta" id="dm-meta"></div>

    <!-- AI coaching box -->
    <div class="ai-box" id="dm-ai-box">
      <div class="ai-box-title">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        AI COACH — TIẾNG VIỆT
      </div>
      <div class="ai-box-content" id="dm-ai-content">
        <div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>
      </div>
    </div>

    <div class="dm-divider"></div>

    <!-- Technique cues -->
    <div class="dm-section">
      <div class="dm-sec-title">Kỹ thuật thực hiện</div>
      <ul class="cue-list" id="dm-cues"></ul>
    </div>

    <div class="dm-divider"></div>

    <!-- Common mistakes -->
    <div class="dm-section">
      <div class="dm-sec-title">Lỗi sai thường gặp</div>
      <div class="mistake-list" id="dm-mistakes"></div>
    </div>

    <div class="dm-divider"></div>

    <!-- Sets/reps recommendation -->
    <div class="dm-section">
      <div class="dm-sec-title">Gợi ý sets × reps</div>
      <div id="dm-recs" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"></div>
    </div>

    <div class="dm-divider"></div>

    <button class="add-btn" onclick="addToWorkout()">
      <svg style="width:14px;height:14px;vertical-align:-2px;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Thêm vào buổi tập
    </button>
  </div>
</div>

<script>
// ═══════ DATA & STATE ═══════
let ALL_EX=[];
let filtered=[];
let currentEquip='all';
let currentMuscle='all';
let currentSearch='';
let sortAZ=true;
let currentEx=null;

// Static exercise database with GIF URLs from ExerciseDB / wger style
// Using exercisedb api format - gifUrl points to real hosted GIFs
const EXERCISES=[
  // CHEST
  {id:1,ytId:'SCVCLChPQFY',name:'Barbell Bench Press',nameVi:'Bench Press Barbell',muscle:'chest',equipment:'barbell',difficulty:'intermediate',gif:'https://v2.exercisedb.io/image/9pRJf1pSr14mUK',emoji:'🏋️',sets_hyper:'4×8-12',sets_strength:'5×3-5',sets_endure:'3×15-20',cues:['Nằm trên bench, mắt thẳng dưới bar','Grip rộng hơn vai 1 nắm tay, cổ tay thẳng','Hạ bar chậm đến ngực dưới (~nipple line)','Khuỷu tay ~45-75° so với thân, không flare rộng','Đẩy theo đường chéo về phía mặt, không thẳng đứng','Lưng uốn nhẹ tự nhiên, vai kẹp vào bench'],mistakes:['Flare khuỷu tay 90° — hại vai','Bounce bar khỏi ngực','Mông nhấc khỏi bench','Cổ tay bị gập xuống']},
  {id:2,ytId:'8iPEnn-ltC8',name:'Incline Dumbbell Press',nameVi:'Incline Dumbbell Press',muscle:'chest',equipment:'dumbbell',difficulty:'beginner',gif:'https://v2.exercisedb.io/image/mXAGJnVFNrBKmP',emoji:'💪',sets_hyper:'3×10-15',sets_strength:'4×6-8',sets_endure:'3×15-20',cues:['Bench nghiêng 30-45°, không quá dốc','Dumbbells ở ngang ngực trên, không quá cao','Đẩy thẳng lên, chạm nhẹ ở đỉnh','Hạ chậm 2-3 giây, cảm nhận stretch ngực'],mistakes:['Bench dốc quá 45° — chuyển sang shoulder press','Dumbbells va chạm mạnh ở đỉnh']},
  {id:3,ytId:'Iwe6AmxVf7o',name:'Cable Fly',nameVi:'Cable Fly',muscle:'chest',equipment:'cable',difficulty:'beginner',gif:'https://v2.exercisedb.io/image/GiL1bRi5v9hj4V',emoji:'🎯',sets_hyper:'3×12-15',sets_strength:'',sets_endure:'4×15-20',cues:['Đứng giữa 2 cable, tay cầm handle','Cánh tay hơi cong (không khóa khuỷu)','Kéo hai tay gặp nhau trước ngực, squeeze 2 giây','Trả về từ từ, cảm nhận stretch ngực trên'],mistakes:['Khóa khuỷu tay thẳng cứng','Dùng lực lưng thay vì ngực']},
  {id:4,ytId:'IODxDxX7oi4',name:'Push Up',nameVi:'Hít đất',muscle:'chest',equipment:'body weight',difficulty:'beginner',gif:'https://v2.exercisedb.io/image/eOjPpjJKOIuDSF',emoji:'🤸',sets_hyper:'4×10-20',sets_strength:'',sets_endure:'5×20-30',cues:['Tay rộng hơn vai 1 nắm, ngón trỏ hướng về trước','Cơ thể thẳng từ đầu đến gót chân','Hạ ngực chạm gần sàn, không để hông võng','Đẩy lên mạnh, squeeze ngực ở trên'],mistakes:['Hông võng xuống hoặc nhô lên','Đầu cúi quá thấp','Tay quá rộng hoặc quá hẹp']},

  // BACK
  {id:5,ytId:'op9kVnSso6Q',name:'Barbell Deadlift',nameVi:'Deadlift Barbell',muscle:'back',equipment:'barbell',difficulty:'advanced',gif:'https://v2.exercisedb.io/image/yY2K0MNlpS-ADe',emoji:'🏋️',sets_hyper:'4×6-8',sets_strength:'5×1-5',sets_endure:'3×10-12',cues:['Bar sát ống chân, vai hơi trước bar','Hít sâu, brace bụng — giữ trước khi kéo','Đẩy sàn xuống, không phải kéo bar lên','Hông và vai cùng tốc độ đi lên','Giữ lưng thẳng — không round lưng dưới'],mistakes:['Rounding lưng dưới — nguy hiểm nhất','Bar xa chân tạo đòn bẩy xấu','Hyperextend lưng ở trên cùng','Không brace core trước khi kéo']},

// ═══════ INIT ═══════
window.onload=async()=>{
  ALL_EX=[...EXERCISES];
  filtered=[...ALL_EX];
  renderGrid(filtered);
};

function renderGrid(exs){
  const grid=document.getElementById('ex-grid');
  document.getElementById('count-txt').textContent=`${exs.length} bài tập`;
  if(exs.length===0){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="big">🔍</div><p>Không tìm thấy bài tập phù hợp.<br>Thử từ khóa khác nhé!</p></div>';
    return;
  }
  grid.innerHTML=exs.map(ex=>`
    <div class="ex-card" onclick="openDetail(${ex.id})">
      <div class="ex-gif-placeholder" style="background:${getGradient(ex.muscle)}">
        <div class="ex-emoji" style="font-size:36px">${ex.emoji}</div>
        <div class="ex-pname">${ex.nameVi}</div>
      </div>
      <div class="ex-info">
        <div class="ex-name">${ex.nameVi}</div>
        <div class="ex-tags">
          <span class="ex-tag tg-muscle">${muscleVi(ex.muscle)}</span>
          <span class="ex-tag tg-equip">${equipVi(ex.equipment)}</span>
          <span class="ex-tag tg-diff">${diffVi(ex.difficulty)}</span>
        </div>
      </div>
    </div>`).join('');
}

function getGradient(muscle){
  const map={
    chest:'linear-gradient(135deg,#1a1000,#2e1a00)',
    back:'linear-gradient(135deg,#001a1a,#002e2e)',
    shoulders:'linear-gradient(135deg,#1a001a,#2e002e)',
    'upper arms':'linear-gradient(135deg,#1e2e00,#2d4400)',
    'upper legs':'linear-gradient(135deg,#001a33,#002e52)',
    glutes:'linear-gradient(135deg,#1a0015,#2e0025)',
    core:'linear-gradient(135deg,#1a0a00,#301500)',
    'lower legs':'linear-gradient(135deg,#001a0a,#003018)',
  };
  return map[muscle]||'linear-gradient(135deg,#181818,#222)';
}

function muscleVi(m){const map={'chest':'Ngực','back':'Lưng','shoulders':'Vai','upper arms':'Bắp tay','upper legs':'Đùi','glutes':'Mông','core':'Core','lower legs':'Bắp chân'};return map[m]||m;}
function equipVi(e){const map={'barbell':'Barbell','dumbbell':'Dumbbell','cable':'Cable','machine':'Máy','body weight':'Bodyweight'};return map[e]||e;}
function diffVi(d){const map={'beginner':'Cơ bản','intermediate':'Trung cấp','advanced':'Nâng cao'};return map[d]||d;}

// ═══════ FILTERS ═══════
function filterEquip(eq,btn){
  currentEquip=eq;
  document.querySelectorAll('#equip-filters .pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');applyFilters();
}
function filterMuscle(m,btn){
  currentMuscle=m;
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');applyFilters();
}
function onSearch(v){
  currentSearch=v.toLowerCase();
  document.getElementById('search-clear').style.display=v?'block':'none';
  applyFilters();
}
function clearSearch(){
  document.getElementById('search-inp').value='';
  document.getElementById('search-clear').style.display='none';
  currentSearch='';applyFilters();
}
function applyFilters(){
  filtered=ALL_EX.filter(ex=>{
    const mOk=currentMuscle==='all'||ex.muscle===currentMuscle;
    const eOk=currentEquip==='all'||ex.equipment===currentEquip;
    const sOk=!currentSearch||ex.name.toLowerCase().includes(currentSearch)||ex.nameVi.toLowerCase().includes(currentSearch)||muscleVi(ex.muscle).toLowerCase().includes(currentSearch);
    return mOk&&eOk&&sOk;
  });
  if(sortAZ)filtered.sort((a,b)=>a.nameVi.localeCompare(b.nameVi));
  renderGrid(filtered);
}
function toggleSort(){
  sortAZ=!sortAZ;
  document.getElementById('sort-lbl').textContent=sortAZ?'A→Z':'Z→A';
  filtered.sort((a,b)=>sortAZ?a.nameVi.localeCompare(b.nameVi):b.nameVi.localeCompare(a.nameVi));
  renderGrid(filtered);
}

// ═══════ DETAIL MODAL ═══════
async function openDetail(id){
  const ex=ALL_EX.find(e=>e.id===id);
  if(!ex)return;
  currentEx=ex;

  // Set name
  document.getElementById('dm-name').textContent=ex.nameVi;

  // GIF or emoji placeholder
  const gifWrap=document.getElementById('dm-gif-wrap');
  gifWrap.innerHTML=`<div class="dm-gif-placeholder" style="background:${getGradient(ex.muscle)};width:100%;height:100%">
    <span style="font-size:80px">${ex.emoji}</span>
  </div>`;

  // Try to load GIF
  if(ex.gif){
    const img=new Image();
    img.onload=()=>{
      gifWrap.innerHTML=`<img class="dm-gif" src="${ex.gif}" alt="${ex.nameVi}">`;
    };
    img.onerror=()=>{};
    img.src=ex.gif;
  }

  // Add YouTube button if available
  const existingYtBtn=document.getElementById('yt-play-btn');
  if(existingYtBtn)existingYtBtn.remove();
  if(ex.ytId){
    const ytBtn=document.createElement('button');
    ytBtn.id='yt-play-btn';
    ytBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Xem video hướng dẫn';
    ytBtn.style.cssText='position:absolute;bottom:12px;right:12px;background:rgba(220,0,0,.9);color:#fff;border:none;border-radius:6px;padding:8px 13px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:"DM Sans",sans-serif;z-index:5';
    ytBtn.onclick=()=>{
      gifWrap.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ex.ytId}?autoplay=1&rel=0" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="border:none"></iframe>`;
    };
    document.getElementById('dm-gif-wrap').style.position='relative';
    document.getElementById('dm-gif-wrap').appendChild(ytBtn);
  }

  // Badges
  document.getElementById('dm-badges').innerHTML=`
    <span class="dm-badge" style="background:rgba(200,241,53,.2);color:#c8f135">${muscleVi(ex.muscle)}</span>
    <span class="dm-badge" style="background:rgba(77,159,255,.2);color:#4d9fff">${equipVi(ex.equipment)}</span>
    <span class="dm-badge" style="background:rgba(255,184,77,.2);color:#ffb84d">${diffVi(ex.difficulty)}</span>`;

  // Meta
  document.getElementById('dm-meta').innerHTML=`
    <span class="ex-tag tg-muscle" style="font-size:11px;padding:3px 10px">${muscleVi(ex.muscle)}</span>
    <span class="ex-tag tg-equip" style="font-size:11px;padding:3px 10px">${equipVi(ex.equipment)}</span>
    <span class="ex-tag tg-diff" style="font-size:11px;padding:3px 10px">${diffVi(ex.difficulty)}</span>`;

  // Cues
  document.getElementById('dm-cues').innerHTML=ex.cues.map((c,i)=>`
    <li class="cue-item">
      <div class="cue-num">${i+1}</div>
      <div class="cue-text">${c}</div>
    </li>`).join('');

  // Mistakes
  document.getElementById('dm-mistakes').innerHTML=ex.mistakes.map(m=>`
    <div class="mistake-item">${m}</div>`).join('');

  // Sets/reps recommendations
  const recs=[
    {goal:'Tăng cơ',val:ex.sets_hyper,color:'#c8f135',bg:'#1e2e00'},
    {goal:'Sức mạnh',val:ex.sets_strength||'—',color:'#ff4545',bg:'#2e0d0d'},
    {goal:'Sức bền',val:ex.sets_endure,color:'#4d9fff',bg:'#0d1e33'},
  ];
  document.getElementById('dm-recs').innerHTML=recs.map(r=>`
    <div style="background:${r.bg};border-radius:var(--r);padding:10px;text-align:center">
      <div style="font-size:9.5px;color:${r.color};font-family:var(--FM);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">${r.goal}</div>
      <div style="font-size:12px;font-weight:500;line-height:1.3">${r.val}</div>
    </div>`).join('');

  // Show modal
  const modal=document.getElementById('detail-modal');
  modal.style.display='flex';
  setTimeout(()=>modal.classList.add('show'),10);

  // AI coaching — async
  document.getElementById('dm-ai-content').innerHTML='<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>';
  loadAICoach(ex);
}

- Cái gì làm cho người tập thường thấy khó nhất với bài này
- Và 1 cue kỹ thuật giúp fix ngay lập tức

Trả lời tự nhiên như PT đang nói chuyện, không liệt kê bullet points.`;
  try{
    const r=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    const txt=d.content?.find(c=>c.type==='text')?.text||'';
    document.getElementById('dm-ai-content').textContent=txt;
  }catch{
    document.getElementById('dm-ai-content').textContent='Tập trung vào mind-muscle connection — cảm nhận đúng nhóm cơ đang làm việc trước khi tăng tạ.';
  }
}

function closeDetail(){
  const modal=document.getElementById('detail-modal');
  modal.classList.remove('show');
  setTimeout(()=>{modal.style.display='none';},350);
}

function addToWorkout(){
  if(!currentEx)return;
  toast(`✅ Đã thêm "${currentEx.nameVi}" vào buổi tập!`);
  closeDetail();
  setTimeout(()=>window.location.href='app.html',800);
}

// ═══════ TOAST ═══════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

// Handle swipe down to close modal
let startY=0;
document.getElementById('detail-modal').addEventListener('touchstart',e=>startY=e.touches[0].clientY,{passive:true});
document.getElementById('detail-modal').addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-startY;
  if(dy>0)document.getElementById('detail-modal').style.transform=`translateY(${dy}px)`;
},{passive:true});
document.getElementById('detail-modal').addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-startY;
  if(dy>120){closeDetail();}
  else{document.getElementById('detail-modal').style.transform='';}
});
</script>
